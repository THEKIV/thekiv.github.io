<head>
<meta charset="UTF-8">

<body>
<center>
<canvas id="matrix"></canvas>
<style type="text/css">
* {
margin: 0;
padding: 0;
}
body {
background: black;
}
canvas {
display: block;
}
</style>
<script>
var matrix = document.getElementById("matrix");
var ctx = matrix.getContext("2d");
//making the canvas full screen
matrix.height = window.innerHeight;
matrix.width = window.innerWidth;
//chinese characters - taken from the unicode charset
var chinese = "DEVHIV.HOST";
//converting the string into an array of single characters
chinese = chinese.split("");
var font_size = 10;
var columns = matrix.width/font_size; //number of columns for the rain
//an array of drops - one per column
var drops = [];
//x below is the x coordinate
//1 = y co-ordinate of the drop(same for every drop initially)
for(var x = 0; x < columns; x++)
drops[x] = 1; 
//drawing the characters
function draw() {
//Black BG for the canvas
//translucent BG to show trail
ctx.fillStyle = "rgba(0, 0, 0, 0.03)"; //0.05
ctx.fillRect(0, 0, matrix.width, matrix.height);
ctx.fillStyle = "#00FF00"; //green text
ctx.font = font_size + "px arial";
//looping over drops
for(var i = 0; i < drops.length; i++) {
//a random chinese character to print
var text = chinese[Math.floor(Math.random()*chinese.length)];
//x = i*font_size, y = value of drops[i]*font_size
ctx.fillText(text, i*font_size, drops[i]*font_size);
//sending the drop back to the top randomly after it has crossed the screen
//adding a randomness to the reset to make the drops scattered on the Y axis
if(drops[i]*font_size > matrix.height && Math.random() > 0.975)
drops[i] = 0;
//incrementing Y coordinate
drops[i]++;
}
}
setInterval(draw, 33);
</script>
</center>
</body>
